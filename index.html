<div id="authModal" class="modal-overlay">
    <div class="modal-glass">
        <button class="close-modal" onclick="toggleModal()">&times;</button>
        
        <div class="modal-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">Sign In</button>
            <button class="auth-tab" onclick="switchAuth('register')">Join the Network</button>
        </div>

        <form id="loginForm" class="auth-form">
            <h2>Welcome Back, Citizen.</h2>
            <div class="input-wrap">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-wrap">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-prestige-gold">Initialize Session</button>
            <div class="social-auth">
                <span>Or connect via</span>
                <div class="icons">
                    <i class="fa-brands fa-google"></i>
                    <i class="fa-brands fa-apple"></i>
                    <i class="fa-brands fa-github"></i>
                </div>
            </div>
        </form>

        <form id="registerForm" class="auth-form hidden">
            <h2>Begin Your Legacy.</h2>
            <p class="modal-sub">Access the Everward ecosystem and secure your travel blueprints.</p>
            <div class="input-wrap">
                <input type="text" placeholder="Full Legal Name" required>
            </div>
            <div class="input-wrap">
                <input type="email" placeholder="Corporate Email" required>
            </div>
            <div class="input-wrap">
                <select>
                    <option disabled selected>Primary Travel Mode</option>
                    <option>Executive Aviation</option>
                    <option>Elite Pedestrian</option>
                    <option>Private Fleet</option>
                </select>
            </div>
            <button type="submit" class="btn-prestige-gold">Create Account</button>
        </form>
    </div>
</div>
