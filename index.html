<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<body class="cinematic-theme">

    <nav class="nav-overlay">
        <div class="container nav-split">
            <div class="brand">
                <div class="logo-v1">EVER<span>WARD</span></div>
                <span class="location-tag">PHL // HQ</span>
            </div>
            <div class="nav-links-v1">
                <a href="discover.html">Sectors</a>
                <a href="aviation.html">Aviation</a>

                <a href="dashboard.html" class="vault-access"><i class="fa-solid fa-key"></i> Vault</a>

    <header class="master-hero">
        <div class="hero-bg-media">
            <div class="scrim"></div>
        </div>

        <div class="hero-v1-content">
            <div class="intel-line">GLOBAL CITIZEN JOE LLC // MISSION READY</div>
            <h1 class="glitch-text">Travel <br>Unrestricted.</h1>
            <p class="hero-subtitle">Vetted sectors. Private assets. Absolute security.</p>

            <div class="portal-search">
                <form action="results.html" class="portal-form">
                    <div class="portal-group">
                        <label>Target Sector</label>
                        <input type="text" placeholder="Enter Destination...">
                    </div>
                    <div class="portal-group">
                        <label>Deployment</label>
                        <input type="text" placeholder="Check-in / Check-out">
                    </div>
                    <button type="submit" class="btn-portal-go">EXECUTE <i class="fa-solid fa-chevron-right"></i></button>
                </form>
            </div>
        </div>
        
        <div class="status-footer">
            <div class="status-item"><span>Status:</span> <strong class="green-glow">Operational</strong></div>
            <div class="status-item"><span>Active Assets:</span> <strong>4,200+</strong></div>
            <div class="status-item"><span>Network:</span> <strong>Encrypted</strong></div>
        </div>
    </header>

</html>
