<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERWARD TOURS | Global Citizen Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="prestige-theme">

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">EVERWARD</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Stays</a>
                <a href="#">Aviation</a>
                <a href="#">Fleet</a>
                <a href="#">Security</a>
            </nav>
            <div class="auth-group">
                <button class="btn-text">Membership</button>
                <button class="btn-gold" onclick="document.getElementById('authModal').style.display='flex'">Sign In</button>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="glitch-text">Where To, Citizen?</h1>
            <p>High-Logistics Travel for the Global Elite.</p>

            <div class="search-card">
                <div class="search-modes">
                    <button class="mode-btn active"><i class="fa-solid fa-person-walking"></i> Pedestrian</button>
                    <button class="mode-btn"><i class="fa-solid fa-plane"></i> Aviation</button>
                    <button class="mode-btn"><i class="fa-solid fa-car"></i> Fleet</button>
                </div>
                <form class="search-form">
                    <input type="text" placeholder="Destination" class="input-main">
                    <input type="text" placeholder="Timeline" class="input-main">
                    <button type="submit" class="btn-search">Search Logistics</button>
                </form>
            </div>
        </div>
    </section>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('authModal').style.display='none'">&times;</span>
            <h2>Member Access</h2>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="btn-gold">Initialize Session</button>
        </div>
    </div>

</body>
</html>
