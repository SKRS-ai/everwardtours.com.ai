<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERWARD TOURS | Global Citizen Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="prestige-theme">

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">EVERWARD</span>
            </div>
            <div class="auth-group">
                <button class="btn-gold">Sign In</button>
            </div>
        </div>
    </header>

    <section class="casa-arizona-hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="fade-in">Casa Arizona</h1>
            <p class="subtitle">Secure Desert Blueprint // Location: Sedona</p>

            <div class="search-shield">
                <div class="mode-toggles">
                    <button class="m-btn active">Pedestrian</button>
                    <button class="m-btn">Aviation</button>
                    <button class="m-btn">Fleet</button>
                </div>
                <form class="booking-engine">
                    <div class="field">
                        <i class="fa-solid fa-location-arrow"></i>
                        <input type="text" placeholder="Check Availability">
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-calendar-day"></i>
                        <input type="text" placeholder="Dates">
                    </div>
                    <button type="submit" class="btn-execute">Initialize</button>
                </form>
            </div>
        </div>
    </section>

    <section class="blueprint-gallery">
        <div class="container">
            <h2 class="section-title">Visual Reconnaissance</h2>
            <div class="gallery-grid">
                <div class="photo-card large">
                    <img src="https://images.unsplash.com/photo-1580618672591-eb180b1a973f?q=80&w=1200" alt="Arizona Exterior">
                    <div class="p-info">Exterior Perimeter</div>
                </div>
                <div class="photo-card">
                    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=600" alt="Arizona View">
                    <div class="p-info">Deck Vantage</div>
                </div>
                <div class="photo-card">
                    <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?q=80&w=600" alt="Interior">
                    <div class="p-info">Secure Suite</div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
