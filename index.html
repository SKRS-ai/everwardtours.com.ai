<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERWARD TOURS | Private Logistics & Elite Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="prestige-theme">

    <header class="main-header">
        <div class="header-container">
            <div class="brand-side">
                <div class="unbroken-compass"></div>
                <div class="logo">EVERWARD<span>TOURS</span></div>
                <div class="market-ticker">
                    <span class="ticker-item"><i class="fa-solid fa-plane"></i> FLIGHTS: LOWEST</span>
                    <span class="ticker-item"><i class="fa-solid fa-car"></i> FLEET: READY</span>
                </div>
            </div>
            
            <div class="user-side">
                <nav class="main-nav">
                    <a href="#" class="nav-link">Blueprints</a>
                    <a href="#" class="nav-link">Safe Zones</a>
                </nav>
                <div class="auth-cluster">
                    <button class="btn-minimal" onclick="openAuth('register')">Register</button>
                    <button class="btn-prestige" onclick="openAuth('login')">Log In</button>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-logistics">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="pre-title">GLOBAL CITIZEN JOE LLC // SECTOR LOGISTICS</div>
            <h1>PRESTIGE IN MOTION</h1>
            <p>Unified transport database: Air, Rail, and Private Fleet at the world's lowest negotiated rates.</p>

            <div class="unified-search-box">
                <div class="search-tabs">
                    <button class="search-tab active" onclick="setMode('all')"><i class="fa-solid fa-layer-group"></i> All-In-One</button>
                    <button class="search-tab" onclick="setMode('aviation')"><i class="fa-solid fa-plane-up"></i> Aviation</button>
                    <button class="search-tab" onclick="setMode('fleet')"><i class="fa-solid fa-car-side"></i> Fleet</button>
                    <button class="search-tab" onclick="setMode('rail')"><i class="fa-solid fa-train"></i> Rail</button>
                </div>

                <form class="search-engine-form">
                    <div class="input-set">
                        <label>Origin</label>
                        <input type="text" placeholder="Current Location">
                    </div>
                    <div class="input-set border-left">
                        <label>Target Destination</label>
                        <input type="text" placeholder="Where to, Citizen?">
                    </div>
                    <div class="input-set border-left">
                        <label>Logistics Timeline</label>
                        <input type="text" placeholder="Select Dates">
                    </div>
                    <button type="submit" class="execute-search-btn">
                        <span>SEARCH RATES</span>
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </form>
                <div class="database-status">
                    <i class="fa-solid fa-database"></i> Connected to Global Reservation Network // <span class="gold-text">BEST PRICES GUARANTEED</span>
                </div>
            </div>
        </div>
    </section>

    <div id="authModal" class="modal-backdrop">
        <div class="modal-glass-card">
            <button class="close-modal" onclick="closeAuth()">&times;</button>
            <div id="auth-content">
                </div>
        </div>
    </div>

</body>
</html>
